name: Build Model Download CLI

on:
  push:
    branches:
      - main
    paths:
      - 'src/download-cli/**'
  pull_request:
    paths:
      - 'src/download-cli/**'
  release:
    types: [published]

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: "model-download-x86_64-pc-windows-msvc.exe"
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: "model-download-x86_64-unknown-linux-musl"
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: "model-download-x86_64-apple-darwin"
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: "model-download-aarch64-apple-darwin"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          targets: ${{ matrix.target }}
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-index-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.target }}-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        working-directory: src-tauri/src/download-cli
        run: |
          cargo build --release --target ${{ matrix.target }} --bin model-download

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: src-tauri/src/download-cli
        shell: bash
        run: mv target/${{ matrix.target }}/release/model-download.exe ./${{ matrix.artifact }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: src-tauri/src/download-cli
        run: mv target/${{ matrix.target }}/release/model-download ./${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/src/download-cli/${{ matrix.artifact }}
          retention-days: 30

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
