<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ModelBatchDown</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 20px; min-height: 100vh; }
.container { max-width: 1100px; margin: 0 auto; }
h1 { text-align: center; color: #00d4ff; font-size: 24px; margin-bottom: 8px; }
.subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
.main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
.panel { background: #16213e; border-radius: 10px; padding: 16px; }
label { display: block; color: #aaa; font-size: 12px; margin-bottom: 6px; }
input, textarea, select { width: 100%; padding: 10px; background: #0f3460; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 14px; outline: none; }
textarea { resize: vertical; font-family: monospace; }
select { cursor: pointer; }
.checkbox-wrap { display: flex; align-items: center; gap: 8px; margin-top: 12px; cursor: pointer; }
.checkbox-wrap input { width: 18px; height: 18px; accent-color: #00d4ff; }
.btn-row { display: flex; gap: 12px; margin-top: 16px; }
button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
.btn-start { background: linear-gradient(135deg, #00d4ff, #0077b6); color: white; }
.btn-start:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-stop { background: linear-gradient(135deg, #ff4757, #c0392b); color: white; }
.btn-stop:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-stop:disabled { opacity: 0.4; cursor: not-allowed; }
.stat-box { background: #0f3460; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.stat-label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { color: #00d4ff; font-size: 20px; font-weight: bold; margin-top: 4px; }
.log-area { background: #0a0a1a; border-radius: 8px; padding: 12px; height: 300px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.6; color: #ccc; }
.log-line { word-break: break-all; }
.log-error { color: #ff6b6b; }
.log-success { color: #51cf66; }
.log-info { color: #74c0fc; }
.progress-bar-container { background: #0f3460; border-radius: 8px; height: 28px; overflow: hidden; position: relative; margin-top: 8px; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #0077b6); transition: width 0.3s ease; border-radius: 8px; }
.progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; font-weight: bold; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<div class="container">
<h1>🚀 ModelBatchDown</h1>
<p class="subtitle">支持 HF/魔塔双平台 | GGUF量化选择 | 进度可视化 | 自动关机</p>

<div class="main-grid">
<div class="panel">
<label>GGUF 量化版本（自动过滤）</label>
<select id="ggufQuant">
<option value="Q4_K_M">Q4_K_M (推荐)</option>
<option value="Q3_K_M">Q3_K_M</option>
<option value="Q4_K_S">Q4_K_S</option>
<option value="Q5_K_S">Q5_K_S</option>
<option value="Q5_K_M">Q5_K_M</option>
<option value="Q6_K">Q6_K</option>
<option value="Q8_0">Q8_0</option>
</select>

<label style="margin-top:14px">📥 批量模型链接（一行一个）</label>
<textarea id="urls" rows="5" placeholder="例如：&#10;https://huggingface.co/unsloth/LTX-2.3-GGUF&#10;https://modelscope.cn/xxx/yyy"></textarea>

<label style="margin-top:14px">📁 保存根目录</label>
<input type="text" id="saveRoot" placeholder="D:/Downloads/Models">

<div class="checkbox-wrap">
<input type="checkbox" id="autoShutdown">
<span>🔌 全部任务下载完成后自动关机（需等待60秒）</span>
</div>

<div class="btn-row">
<button class="btn-start" onclick="handleStartDownload()" id="startBtn">▶️ 开始批量下载</button>
<button class="btn-stop" onclick="stopDownload()" id="stopBtn" disabled>⏹️ 停止下载</button>
</div>
<div id="loginStatus" class="login-status" style="margin-top:12px;text-align:center;font-size:12px;color:#888;"></div>
</div>

<div class="panel">
<div class="stat-box">
<div class="stat-label">📊 下载速度</div>
<div class="stat-value" id="speedValue">0.00 MB/s</div>
</div>

<div class="stat-box">
<div class="stat-label">📈 下载进度</div>
<div class="progress-bar-container">
<div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
<span class="progress-text" id="progressText">0%</span>
</div>
</div>

<label style="margin-top:14px">📜 运行日志</label>
<div class="log-area" id="logArea"></div>
</div>
</div>
</div>

<script>
const { invoke } = window.__TAURI__.core;
const { listen } = window.__TAURI__.event;

let isDownloading = false;
let isLoggedIn = false;
let currentUser = null;

listen('download-log', (event) => {
    addLog(event.payload.msg, 'info');
});

listen('download-progress', (event) => {
    const p = event.payload.percent || 0;
    document.getElementById('progressFill').style.width = p + '%';
    document.getElementById('progressText').textContent = Math.round(p) + '%';
});

listen('download-speed', (event) => {
    document.getElementById('speedValue').textContent = (event.payload.speed || 0).toFixed(2) + ' MB/s';
});

listen('download-finished', () => {
    isDownloading = false;
    updateButtons();
    addLog('✅ 所有下载任务完成', 'success');
});

listen('login-success', (event) => {
    console.log('[App] 登录成功:', event.payload);
    isLoggedIn = true;
    currentUser = event.payload;
    updateLoginStatus();
    addLog('✅ 微信登录成功: ' + (currentUser.nickname || currentUser.name || '用户'), 'success');
});

async function checkLoginStatus() {
    try {
        const loggedIn = await invoke('check_login_status');
        isLoggedIn = loggedIn;
        if (loggedIn) {
            currentUser = await invoke('get_user_info');
        }
        updateLoginStatus();
    } catch (err) {
        console.error('[App] 检查登录状态失败:', err);
        isLoggedIn = false;
        updateLoginStatus();
    }
}

function updateLoginStatus() {
    const statusEl = document.getElementById('loginStatus');
    if (!statusEl) return;
    
    if (isLoggedIn && currentUser) {
        const nickname = currentUser.nickname || currentUser.name || currentUser.username || '用户';
        statusEl.innerHTML = `✅ 已登录: ${nickname} | <a href="#" onclick="handleLogout()" style="color:#ff6b6b;">退出登录</a>`;
        statusEl.style.color = '#51cf66';
    } else {
        statusEl.innerHTML = `❌ 未登录 | <a href="#" onclick="handleLogin()" style="color:#00d4ff;">微信登录</a>`;
        statusEl.style.color = '#888';
    }
}

async function handleLogin() {
    try {
        addLog('[INFO] 正在打开微信登录窗口...', 'info');
        await invoke('open_wechat_login_window');
    } catch (err) {
        addLog('❌ 打开登录窗口失败: ' + err, 'error');
    }
}

async function handleLogout() {
    try {
        await invoke('logout');
        isLoggedIn = false;
        currentUser = null;
        updateLoginStatus();
        addLog('[INFO] 已退出登录', 'info');
    } catch (err) {
        addLog('❌ 退出登录失败: ' + err, 'error');
    }
}

async function handleStartDownload() {
    if (!isLoggedIn) {
        addLog('❌ 请先登录后再使用下载功能', 'error');
        await handleLogin();
        return;
    }
    await startDownload();
}

function addLog(msg, type='info') {
    const area = document.getElementById('logArea');
    const div = document.createElement('div');
    div.className = 'log-line log-' + type;
    const time = new Date().toLocaleTimeString();
    div.textContent = '[' + time + '] ' + msg;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
}

async function startDownload() {
    const urls = document.getElementById('urls').value.trim();
    const saveRoot = document.getElementById('saveRoot').value.trim();
    const ggufQuant = document.getElementById('ggufQuant').value;
    const autoShutdown = document.getElementById('autoShutdown').checked;

    if (!urls) {
        alert('请输入至少一个模型链接');
        return;
    }
    if (!saveRoot) {
        alert('请输入保存目录');
        return;
    }

    document.getElementById('logArea').innerHTML = '';

    try {
        const result = await invoke('start_download', {
            urls,
            saveRoot,
            ggufQuant,
            autoShutdown
        });
        isDownloading = true;
        updateButtons();
        addLog(result, 'success');
    } catch (err) {
        addLog('❌ ' + err, 'error');
    }
}

async function stopDownload() {
    if (!isDownloading) return;
    try {
        const result = await invoke('stop_download');
        addLog(result, 'info');
        isDownloading = false;
        updateButtons();
    } catch (err) {
        addLog('❌ ' + err, 'error');
    }
}

function updateButtons() {
    document.getElementById('startBtn').disabled = isDownloading;
    document.getElementById('stopBtn').disabled = !isDownloading;
}

window.addEventListener('DOMContentLoaded', async () => {
    await checkLoginStatus();
});
</script>
</body>
</html>
